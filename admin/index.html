<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어드민 — 히루기♥</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:    #FFFAF7;
    --pink:  #E8A0BC;
    --text:  #2D1A24;
    --beige: #F5ECD7;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  .login-wrap {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .login-card {
    background: #fff; border: 1px solid rgba(232,160,188,0.35);
    border-radius: 20px; padding: 2.5rem 2rem;
    width: 320px; text-align: center;
  }
  .login-card h1 { font-size: 1.3rem; margin-bottom: 0.4rem; }
  .login-card p { font-size: 13px; color: rgba(45,26,36,0.5); margin-bottom: 1.5rem; }
  .login-card input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid rgba(45,26,36,0.15); font-family: inherit;
    font-size: 14px; background: var(--bg); color: var(--text);
    margin-bottom: 10px; outline: none;
  }
  .login-card input:focus { border-color: var(--pink); }
  .login-err { font-size: 12px; color: #e06060; margin-bottom: 8px; display: none; }

  /* ── LAYOUT ── */
  .admin-wrap { display: none; }
  nav {
    position: sticky; top: 0; z-index: 100;
    padding: 1rem 6vw; display: flex;
    justify-content: space-between; align-items: center;
    background: rgba(232,160,188,0.18);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(232,160,188,0.3);
  }
  .nav-logo { font-size: 1.1rem; font-weight: 700; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .btn-sm {
    padding: 6px 14px; border-radius: 20px; font-size: 12px;
    font-family: inherit; cursor: pointer; transition: opacity 0.15s;
    border: 1px solid rgba(45,26,36,0.15); background: #fff; color: var(--text);
  }
  .btn-sm:hover { opacity: 0.75; }
  .btn-sm.primary {
    background: rgba(232,160,188,0.25);
    border-color: rgba(232,160,188,0.5); font-weight: 500;
  }
  .btn-sm.danger { border-color: rgba(200,80,80,0.3); color: #c05050; }

  .container { max-width: 900px; margin: 0 auto; padding: 2rem 5vw 4rem; }

  .page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }

  /* ── 추가 폼 ── */
  .add-form {
    background: #fff; border: 1px solid rgba(232,160,188,0.3);
    border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem;
    position: relative;
  }
  .add-form h2 { font-size: 14px; font-weight: 700; margin-bottom: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 2fr; gap: 10px; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; color: rgba(45,26,36,0.55); font-weight: 500; }
  .form-group input, .form-group select {
    padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(45,26,36,0.15);
    font-family: inherit; font-size: 13px;
    background: var(--bg); color: var(--text); outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--pink); }
  .form-add-btn {
    position: absolute; top: 1.25rem; right: 1.25rem;
    padding: 7px 18px; border-radius: 8px;
    background: rgba(232,160,188,0.25);
    border: 1px solid rgba(232,160,188,0.5);
    font-family: inherit; font-size: 13px; font-weight: 700;
    color: var(--text); cursor: pointer;
    transition: background 0.15s;
  }
  .form-add-btn:hover { background: rgba(232,160,188,0.4); }

  /* ── 테이블 ── */
  .table-wrap { background: #fff; border: 1px solid rgba(45,26,36,0.08); border-radius: 16px; overflow: hidden; }
  .table-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 1.25rem; border-bottom: 1px solid rgba(45,26,36,0.07);
  }
  .table-header h2 { font-size: 14px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; font-size: 11px; font-weight: 600;
    color: rgba(45,26,36,0.5); padding: 10px 16px;
    background: rgba(245,236,215,0.4);
    border-bottom: 1px solid rgba(45,26,36,0.07);
  }
  td { font-size: 13px; padding: 11px 16px; border-bottom: 1px solid rgba(45,26,36,0.05); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.cancelled-row td { opacity: 0.5; }

  .badge-active {
    display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px;
    background: rgba(232,160,188,0.2); border: 1px solid rgba(232,160,188,0.4);
    color: var(--text);
  }
  .badge-cancel {
    display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px;
    background: rgba(45,26,36,0.06); border: 1px solid rgba(45,26,36,0.1);
    color: rgba(45,26,36,0.45);
  }

  .action-group { display: flex; gap: 6px; }

  .empty-row td { text-align: center; color: rgba(45,26,36,0.4); padding: 2.5rem; }

  /* 모달 */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(45,26,36,0.3); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 1.75rem;
    width: 360px; max-width: 90vw;
  }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 1.25rem; }
  .modal .form-group { margin-bottom: 12px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  .type-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 6px; }
  .type-chip {
    padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    background: rgba(45,26,36,0.05); border: 1.5px solid rgba(45,26,36,0.12);
    color: rgba(45,26,36,0.6); transition: all 0.15s;
  }
  .type-chip.active {
    background: color-mix(in srgb, var(--c) 25%, white);
    border-color: var(--c); color: var(--text); font-weight: 700;
  }
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; font-size: 13px;
    padding: 10px 20px; border-radius: 20px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; z-index: 300;
  }
  .login-btn {
    width: 100%; padding: 11px;
    border-radius: 10px; border: none;
    background: linear-gradient(135deg, #E8A0BC, #D4789F);
    color: #fff; font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 14px rgba(232,160,188,0.35);
  }
  .login-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>히루기♥</h1>
    <p>Supabase 계정으로 로그인하세요</p>
    <p class="login-err" id="login-err"></p>
    <input type="email" id="email-input" placeholder="이메일" autocomplete="username">
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 어드민 본체 -->
<div class="admin-wrap" id="admin-wrap">
  <nav>
    <span class="nav-logo">히루기♥ 어드민</span>
    <div class="nav-right">
      <a href="../" target="_blank" class="btn-sm">← 사이트 보기</a>
      <button class="btn-sm danger" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="container">
    <p class="page-title">방송 일정 관리</p>

    <!-- 추가 폼 -->
    <div class="add-form">
      <h2>일정 추가</h2>
      <!-- 타입 체크박스 -->
      <div class="form-group" style="margin-bottom:12px;">
        <label>방송 유형</label>
        <div class="type-chips" id="f-type-chips">
          <button type="button" class="type-chip active" data-type="broadcast" style="--c:#E8A0BC">방송</button>
          <button type="button" class="type-chip" data-type="game" style="--c:#93C5FD">게임</button>
          <button type="button" class="type-chip" data-type="song" style="--c:#86EFAC">노래</button>
          <button type="button" class="type-chip" data-type="collab" style="--c:#FCA5A5">합방</button>
          <button type="button" class="type-chip" data-type="event" style="--c:#FCD34D">이벤트</button>
          <button type="button" class="type-chip" data-type="rest" style="--c:#C0B6D6">휴방</button>
          <button type="button" class="type-chip" data-type="other" style="--c:#D1D5DB">기타</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>날짜</label>
          <input type="date" id="f-date" onkeydown="if(event.key==='Enter') addSchedule()">
        </div>
        <div class="form-group">
          <label>시작 시간</label>
          <input type="time" id="f-time" value="21:00">
        </div>
        <div class="form-group">
          <label>제목 (기본: 방송)</label>
          <input type="text" id="f-title" placeholder="비워두면 '방송'으로 저장" onkeydown="if(event.key==='Enter') addSchedule()">
        </div>
        <div class="form-group">
          <label>내용 설명 (선택)</label>
          <input type="text" id="f-desc" placeholder="예: 공포게임 정주행" onkeydown="if(event.key==='Enter') addSchedule()">
        </div>
      </div>
      <button class="form-add-btn" onclick="addSchedule()">추가</button>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <div class="table-header">
        <h2>등록된 일정</h2>
        <span id="list-count" style="font-size:12px;color:rgba(45,26,36,0.45);"></span>
      </div>
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>시간</th>
            <th>제목</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="schedule-tbody">
          <tr class="empty-row"><td colspan="5">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <h3>일정 수정</h3>
    <input type="hidden" id="e-id">
    <div class="form-group" style="margin-bottom:12px;">
      <label>방송 유형</label>
      <div class="type-chips" id="e-type-chips">
        <button type="button" class="type-chip" data-type="broadcast" style="--c:#E8A0BC">방송</button>
        <button type="button" class="type-chip" data-type="game" style="--c:#93C5FD">게임</button>
        <button type="button" class="type-chip" data-type="song" style="--c:#86EFAC">노래</button>
        <button type="button" class="type-chip" data-type="collab" style="--c:#FCA5A5">합방</button>
        <button type="button" class="type-chip" data-type="event" style="--c:#FCD34D">이벤트</button>
        <button type="button" class="type-chip" data-type="rest" style="--c:#C0B6D6">휴방</button>
        <button type="button" class="type-chip" data-type="other" style="--c:#D1D5DB">기타</button>
      </div>
    </div>
    <div class="form-group"><label>날짜</label><input type="date" id="e-date"></div>
    <div class="form-group"><label>시작 시간</label><input type="time" id="e-time"></div>
    <div class="form-group"><label>제목 (기본: 방송)</label><input type="text" id="e-title" placeholder="비워두면 '방송'으로 저장"></div>
    <div class="form-group"><label>내용 설명 (선택)</label><input type="text" id="e-desc" placeholder="예: 공포게임 정주행"></div>
    <div class="modal-btns">
      <button class="btn-sm" onclick="closeModal()">취소</button>
      <button class="btn-sm primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL  = 'https://xjgzdngivwjemcuzwsiw.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqZ3pkbmdpdndqZW1jdXp3c2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNzI2NDcsImV4cCI6MjA5NDc0ODY0N30.dm1CYfoh_kVm-XDzbclOzt7qQezrk7ocSbNBMYF_v3M';

  let accessToken = null;

  function authHeaders() {
    return {
      apikey: SUPABASE_ANON,
      Authorization: `Bearer ${accessToken || SUPABASE_ANON}`,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    };
  }

  // ── 로그인 ──
  async function doLogin() {
    const email = document.getElementById('email-input').value.trim();
    const pw    = document.getElementById('pw-input').value;
    const err   = document.getElementById('login-err');
    err.style.display = 'none';

    const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const data = await res.json();

    if (data.access_token) {
      accessToken = data.access_token;
      sessionStorage.setItem('hiroogi_token', accessToken);
      showAdmin();
    } else {
      err.textContent = data.error_description || '로그인 실패';
      err.style.display = 'block';
    }
  }

  async function doLogout() {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${accessToken}` }
    });
    accessToken = null;
    sessionStorage.removeItem('hiroogi_token');
    location.reload();
  }

  function showAdmin() {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    loadSchedule();
  }

  document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

  // 세션 복원
  const saved = sessionStorage.getItem('hiroogi_token');
  if (saved) {
    accessToken = saved;
    showAdmin();
  }

  // ── 타입 칩 ──
  function initChips(containerId) {
    document.getElementById(containerId).querySelectorAll('.type-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById(containerId).querySelectorAll('.type-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  }
  function getActiveType(containerId) {
    const active = document.getElementById(containerId).querySelector('.type-chip.active');
    return active ? active.dataset.type : 'broadcast';
  }
  function setActiveType(containerId, type) {
    document.getElementById(containerId).querySelectorAll('.type-chip').forEach(b => {
      b.classList.toggle('active', b.dataset.type === type);
    });
  }
  initChips('f-type-chips');
  initChips('e-type-chips');

  // ── CRUD ──
  async function loadSchedule() {
    const res  = await fetch(`${SUPABASE_URL}/rest/v1/stream_schedule?select=*&order=scheduled_date.desc`, { headers: authHeaders() });
    const data = await res.json();
    if (!Array.isArray(data)) { doLogout(); return; }
    renderTable(data);
  }

  function renderTable(data) {
    const tbody = document.getElementById('schedule-tbody');
    const count = document.getElementById('list-count');
    count.textContent = `총 ${data.length}건`;
    if (!data.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">등록된 일정이 없어요</td></tr>';
      return;
    }
    const DAY = ['일','월','화','수','목','금','토'];
    tbody.innerHTML = data.map(row => {
      const d   = new Date(row.scheduled_date);
      const day = DAY[d.getDay()];
      const time = row.start_time ? row.start_time.slice(0,5) : '—';
      const badge = row.is_active
        ? `<span class="badge-active">방송</span>`
        : `<span class="badge-cancel">휴방</span>`;
      return `<tr class="${row.is_active?'':'cancelled-row'}">
        <td>${row.scheduled_date} (${day})</td>
        <td>${time}</td>
        <td>${row.title || '<span style="opacity:.4">—</span>'}</td>
        <td>${badge}</td>
        <td><div class="action-group">
          <button class="btn-sm" onclick="openEdit(${JSON.stringify(row).replace(/"/g,'&quot;')})">수정</button>
          <button class="btn-sm danger" onclick="deleteRow(${row.id})">삭제</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  async function addSchedule() {
    const date  = document.getElementById('f-date').value;
    const time  = document.getElementById('f-time').value;
    const title = document.getElementById('f-title').value.trim();
    const desc  = document.getElementById('f-desc').value.trim();
    const ctype = getActiveType('f-type-chips');
    if (!date || !time) { showToast('날짜와 시간을 입력해주세요'); return; }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/stream_schedule`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({
        scheduled_date: date, start_time: time+':00',
        is_active: ctype !== 'rest',
        title: title || null, content_type: ctype, description: desc || null
      })
    });
    if (!res.ok) { showToast('저장 실패 — RLS 정책 확인'); return; }
    showToast('추가했어요 ✓');
    document.getElementById('f-date').value  = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value  = '';
    setActiveType('f-type-chips', 'broadcast');
    loadSchedule();
  }

  async function deleteRow(id) {
    if (!confirm('삭제할까요?')) return;
    await fetch(`${SUPABASE_URL}/rest/v1/stream_schedule?id=eq.${id}`, { method: 'DELETE', headers: authHeaders() });
    showToast('삭제했어요');
    loadSchedule();
  }

  function openEdit(row) {
    document.getElementById('e-id').value    = row.id;
    document.getElementById('e-date').value  = row.scheduled_date;
    document.getElementById('e-time').value  = row.start_time ? row.start_time.slice(0,5) : '';
    document.getElementById('e-title').value = row.title || '';
    document.getElementById('e-desc').value  = row.description || '';
    setActiveType('e-type-chips', row.content_type || 'broadcast');
    document.getElementById('edit-modal').classList.add('open');
  }
  function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

  async function saveEdit() {
    const id    = document.getElementById('e-id').value;
    const date  = document.getElementById('e-date').value;
    const time  = document.getElementById('e-time').value;
    const title = document.getElementById('e-title').value.trim();
    const desc  = document.getElementById('e-desc').value.trim();
    const ctype = getActiveType('e-type-chips');
    await fetch(`${SUPABASE_URL}/rest/v1/stream_schedule?id=eq.${id}`, {
      method: 'PATCH', headers: authHeaders(),
      body: JSON.stringify({
        scheduled_date: date, start_time: time+':00',
        is_active: ctype !== 'rest',
        title: title || null, content_type: ctype, description: desc || null
      })
    });
    closeModal();
    showToast('수정했어요 ✓');
    loadSchedule();
  }

  document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('edit-modal')) closeModal();
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
