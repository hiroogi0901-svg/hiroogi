<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>히루기♥ — SOOP VTuber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #fffaf7;
    --pink:  #e8a0bc;
    --rose:  #d4789f;
    --peach: #f5e6d7;
    --text:  #2d1a24;
    --muted: #a07888;
    --white: #ffffff;
  }

  html, body { height: 100%; background: var(--bg); overflow: hidden; }

  /* 배경 */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 30% 50%, rgba(245,230,215,0.5) 0%, transparent 65%),
      radial-gradient(ellipse 50% 70% at 80% 30%, rgba(232,160,188,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 85%, rgba(212,120,159,0.08) 0%, transparent 55%),
      var(--bg);
  }
  .circles { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .circle { position: absolute; border-radius: 50%; background: rgba(232,160,188,0.07); animation: drift ease-in-out infinite alternate; }
  .c1 { width:320px; height:320px; top:-80px; right:-60px; animation-duration:8s; }
  .c2 { width:180px; height:180px; bottom:10%; left:5%; animation-duration:6s; animation-delay:1s; background:rgba(232,160,188,0.12); }
  .c3 { width:80px; height:80px; top:40%; left:15%; animation-duration:5s; animation-delay:2s; background:rgba(245,230,215,0.3); }
  @keyframes drift { from { transform: translateY(0) scale(1); } to { transform: translateY(-24px) scale(1.04); } }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0.75rem 0;
    background: rgba(232,160,188,0.15); backdrop-filter: blur(16px);
    border-bottom: 1px solid transparent; transition: border-color 0.3s;
  }
  nav.scrolled { border-bottom-color: rgba(232,160,188,0.3); }
  .nav-inner { max-width: 860px; margin: 0 auto; padding: 0 5vw; display: flex; justify-content: space-between; align-items: center; }
  .nav-logo { font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }

  /* SCENE */
  .scene {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    display: grid; grid-template-columns: 1.4fr 2fr;
    height: calc(100vh - 48px - 36px);
    margin-top: 48px;
    align-items: stretch;
  }

  /* LEFT — 이미지 */
  .visual {
    display: flex; align-items: center; justify-content: center;
    position: relative; padding: 2rem 1rem 2rem 0;
  }
  .visual::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 55%, var(--bg) 100%);
    z-index: 1;
  }
  .photo-frame {
    position: relative; z-index: 2;
    width: min(240px, 88%);
    animation: floatIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  .photo-frame::before {
    content: '';
    position: absolute; inset: -8px -8px 8px 8px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--peach), var(--pink));
    opacity: 0.25; z-index: -1;
  }
  .photo-frame img, .photo-placeholder {
    width: 100%; aspect-ratio: 3/5;
    border-radius: 12px;
    object-fit: cover; object-position: center;
    background: linear-gradient(160deg, #fce7f3, #f5e6d7);
    display: block;
  }
  .stamp {
    position: absolute; bottom: -8px; right: -8px; z-index: 3;
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--rose));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px rgba(232,160,188,0.4);
    animation: spinStamp 20s linear infinite;
  }
  .stamp svg { width: 100%; height: 100%; }
  .stamp-inner { position: absolute; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
  @keyframes spinStamp { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatIn { from { opacity:0; transform: translateX(-20px) rotate(-2deg); } to { opacity:1; transform: translateX(0) rotate(0deg); } }

  /* RIGHT — 정보 */
  .info {
    display: flex; flex-direction: column; justify-content: center;
    padding: 2rem 2rem 2rem 1.5rem; gap: 0.9rem;
  }
  .eyebrow {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.58rem; font-weight: 500;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--pink);
    animation: riseIn 0.8s 0.3s both;
  }
  .name-block { animation: riseIn 0.8s 0.45s both; }
  .name-main {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: clamp(2rem, 3.5vw, 2.6rem);
    font-weight: 700;
    line-height: 1; letter-spacing: -0.01em;
    color: var(--text);
  }
  .name-main em { color: var(--pink); font-style: normal; }
  .name-sub {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.65rem; font-weight: 300;
    letter-spacing: 0.15em; color: var(--muted);
    margin-top: 0.3rem;
  }
  .rule { display: flex; align-items: center; gap: 0.6rem; animation: riseIn 0.8s 0.55s both; }
  .rule-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink); flex-shrink: 0; }
  .rule-line { height: 1px; flex: 1; background: linear-gradient(to right, var(--pink), transparent); }

  .bio {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.8rem; font-weight: 300; line-height: 1.8;
    color: var(--muted);
    animation: riseIn 0.8s 0.65s both;
  }

  /* 정보 카드 2×2 그리드 */
  .info-cards {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
    animation: riseIn 0.8s 0.7s both;
  }
  .info-card {
    background: rgba(255,255,255,0.7);
    border: 0.5px solid rgba(232,160,188,0.28);
    border-radius: 10px; padding: 0.45rem 0.5rem;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .info-card:hover { transform: translateY(-2px); box-shadow: 0 3px 10px rgba(232,160,188,0.16); }
  .info-card-label { font-family: 'Noto Sans KR', sans-serif; font-size: 9px; color: rgba(45,26,36,0.38); font-weight: 500; letter-spacing: 0.05em; margin-bottom: 2px; }
  .info-card-val { font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 700; color: var(--text); }

  .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; animation: riseIn 0.8s 0.75s both; }
  .tag {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.63rem; font-weight: 400;
    padding: 0.22rem 0.7rem; border-radius: 999px;
    border: 1px solid rgba(232,160,188,0.3);
    color: var(--pink); background: rgba(232,160,188,0.06);
    transition: all 0.2s; cursor: default;
  }
  .tag:hover { background: rgba(232,160,188,0.14); transform: translateY(-1px); }

  .links { display: flex; gap: 0.5rem; flex-wrap: wrap; animation: riseIn 0.8s 0.85s both; }
  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.7rem; font-weight: 500;
    text-decoration: none; padding: 0.45rem 1rem;
    border-radius: 999px; transition: all 0.25s;
  }
  .btn-fill {
    background: linear-gradient(135deg, var(--pink), var(--rose));
    color: white; box-shadow: 0 3px 12px rgba(232,160,188,0.28);
  }
  .btn-fill:hover { transform: translateY(-2px); box-shadow: 0 5px 16px rgba(232,160,188,0.4); }
  .btn-outline { border: 1px solid rgba(232,160,188,0.35); color: var(--pink); }
  .btn-outline:hover { background: rgba(232,160,188,0.08); transform: translateY(-2px); }

  @keyframes riseIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  /* FOOTER */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 0.5rem 0;
    background: rgba(245,236,215,0.88); backdrop-filter: blur(12px);
    border-top: 1px solid rgba(45,26,36,0.07);
  }
  .footer-inner { max-width: 860px; margin: 0 auto; padding: 0 5vw; display: flex; justify-content: space-between; align-items: center; font-family: 'Noto Sans KR', sans-serif; font-size: 10px; color: rgba(45,26,36,0.38); }
  footer a { color: var(--pink); text-decoration: none; }

  @media (max-width: 640px) {
    html, body { overflow: auto; }
    .scene { grid-template-columns: 1fr; min-height: auto; padding: 48px 0 40px; }
    .visual { padding: 1.5rem 1.5rem 0.5rem; justify-content: flex-start; }
    .visual::after { background: linear-gradient(to bottom, transparent 60%, var(--bg) 100%); }
    .photo-frame { width: 120px; }
    .info { padding: 0.75rem 1.5rem 1.5rem; gap: 0.75rem; }
    .name-main { font-size: clamp(1.8rem, 8vw, 2.4rem); }
    .nav-links { display: none; }
    .nav-inner, .footer-inner { padding: 0 1.5rem; }
    footer { position: sticky; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="circles">

  <div class="circle c2"></div>
  <div class="circle c3"></div>
</div>

<!-- NAV -->
<nav id="nav">
  <div class="nav-inner">
    <a href="#" class="nav-logo">히루기♥</a>

    <div class="info-cards">

    <div class="tags">

    <nav class="links">

      <a class="btn btn-outline" href="https://www.youtube.com/@히루기" target="_blank">▶ 유튜브</a>
    </nav>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <span>© 2026 히루기♥ · 루냥이의 방</span>
    <a href="https://www.sooplive.com/station/hiroogi0901" target="_blank">SOOP →</a>
  </div>
</footer>

<script>
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', scrollY > 10);
  });
</script>
</body>
</html>
