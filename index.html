<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>히루기♥ — SOOP VTuber</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #fffaf7;
    --pink:  #e8a0bc;
    --rose:  #d4789f;
    --peach: #f5e6d7;
    --text:  #2d1a24;
    --muted: #a07888;
    --white: #ffffff;
  }

  html, body { height: 100%; background: var(--bg); overflow: hidden; }

  /* 배경 */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 30% 50%, rgba(245,230,215,0.5) 0%, transparent 65%),
      radial-gradient(ellipse 50% 70% at 80% 30%, rgba(232,160,188,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 85%, rgba(212,120,159,0.08) 0%, transparent 55%),
      var(--bg);
  }
  .circles { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .circle { position: absolute; border-radius: 50%; background: rgba(232,160,188,0.07); animation: drift ease-in-out infinite alternate; }
  .c1 { width:320px; height:320px; top:-80px; right:-60px; animation-duration:8s; }
  .c2 { width:180px; height:180px; bottom:10%; left:5%; animation-duration:6s; animation-delay:1s; background:rgba(232,160,188,0.12); }
  .c3 { width:80px; height:80px; top:40%; left:15%; animation-duration:5s; animation-delay:2s; background:rgba(245,230,215,0.3); }
  @keyframes drift { from { transform: translateY(0) scale(1); } to { transform: translateY(-24px) scale(1.04); } }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1rem 0;
    background: rgba(232,160,188,0.15); backdrop-filter: blur(16px);
    border-bottom: 1px solid transparent; transition: border-color 0.3s;
  }
  nav.scrolled { border-bottom-color: rgba(232,160,188,0.3); }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 5vw; display: flex; justify-content: space-between; align-items: center; }
  .nav-logo { font-family: 'Bodoni Moda', serif; font-size: 1.1rem; font-style: italic; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }

  /* SCENE */
  .scene {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr;
    height: 100vh; padding-top: 56px;
  }

  /* LEFT — 이미지 */
  .visual {
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden; padding: 3rem;
  }
  .visual::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 60%, var(--bg) 100%);
    z-index: 1;
  }
  .photo-frame {
    position: relative; z-index: 2;
    width: min(300px, 70%);
    animation: floatIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  .photo-frame::before {
    content: '';
    position: absolute; inset: -12px -12px 12px 12px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--peach), var(--pink));
    opacity: 0.3; z-index: -1;
  }
  .photo-frame img, .photo-placeholder {
    width: 100%; aspect-ratio: 3/4;
    border-radius: 16px;
    object-fit: cover; object-position: center;
    background: linear-gradient(160deg, #fce7f3, #f5e6d7);
    display: block;
  }
  .stamp {
    position: absolute; bottom: -10px; right: -10px; z-index: 3;
    width: 62px; height: 62px; border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--rose));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(232,160,188,0.4);
    animation: spinStamp 20s linear infinite;
  }
  .stamp svg { width: 100%; height: 100%; }
  .stamp-inner { position: absolute; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
  @keyframes spinStamp { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes floatIn { from { opacity:0; transform: translateX(-30px) rotate(-3deg); } to { opacity:1; transform: translateX(0) rotate(0deg); } }

  /* RIGHT — 정보 */
  .info {
    display: flex; flex-direction: column; justify-content: center;
    padding: 2rem 5vw 2rem 2rem; gap: 1.4rem;
  }
  .eyebrow {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.62rem; font-weight: 500;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--pink);
    animation: riseIn 0.8s 0.3s both;
  }
  .name-block { animation: riseIn 0.8s 0.45s both; }
  .name-main {
    font-family: 'Bodoni Moda', serif;
    font-size: clamp(2.6rem, 4.5vw, 4rem);
    font-weight: 700; line-height: 1; letter-spacing: -0.02em;
    color: var(--text);
  }
  .name-main em { font-style: italic; color: var(--pink); }
  .name-sub {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.7rem; font-weight: 300;
    letter-spacing: 0.18em; color: var(--muted);
    margin-top: 0.4rem;
  }
  .rule { display: flex; align-items: center; gap: 0.8rem; animation: riseIn 0.8s 0.55s both; }
  .rule-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pink); flex-shrink: 0; }
  .rule-line { height: 1px; flex: 1; background: linear-gradient(to right, var(--pink), transparent); }

  .bio {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.875rem; font-weight: 300; line-height: 1.9;
    color: var(--muted);
    animation: riseIn 0.8s 0.65s both;
  }

  /* 정보 카드 그리드 */
  .info-cards {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    animation: riseIn 0.8s 0.7s both;
  }
  .info-card {
    background: rgba(255,255,255,0.7);
    border: 0.5px solid rgba(232,160,188,0.3);
    border-radius: 12px; padding: 0.75rem 0.7rem;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .info-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(232,160,188,0.18); }
  .info-card-label { font-family: 'Noto Sans KR', sans-serif; font-size: 10px; color: rgba(45,26,36,0.4); font-weight: 500; letter-spacing: 0.05em; margin-bottom: 4px; }
  .info-card-val { font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }

  .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; animation: riseIn 0.8s 0.75s both; }
  .tag {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.68rem; font-weight: 400;
    padding: 0.28rem 0.8rem; border-radius: 999px;
    border: 1.5px solid rgba(232,160,188,0.3);
    color: var(--pink); background: rgba(232,160,188,0.06);
    transition: all 0.2s; cursor: default;
  }
  .tag:hover { background: rgba(232,160,188,0.14); transform: translateY(-1px); }

  .links { display: flex; gap: 0.6rem; flex-wrap: wrap; animation: riseIn 0.8s 0.85s both; }
  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem; font-weight: 500;
    text-decoration: none; padding: 0.55rem 1.2rem;
    border-radius: 999px; transition: all 0.25s;
  }
  .btn-fill {
    background: linear-gradient(135deg, var(--pink), var(--rose));
    color: white; box-shadow: 0 4px 14px rgba(232,160,188,0.3);
  }
  .btn-fill:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,160,188,0.42); }
  .btn-outline { border: 1.5px solid rgba(232,160,188,0.35); color: var(--pink); }
  .btn-outline:hover { background: rgba(232,160,188,0.08); transform: translateY(-2px); }

  @keyframes riseIn { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }

  /* FOOTER */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 0.75rem 0;
    background: rgba(245,236,215,0.85); backdrop-filter: blur(12px);
    border-top: 1px solid rgba(45,26,36,0.07);
  }
  .footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 5vw; display: flex; justify-content: space-between; align-items: center; font-family: 'Noto Sans KR', sans-serif; font-size: 11px; color: rgba(45,26,36,0.4); }
  footer a { color: var(--pink); text-decoration: none; }

  /* 모바일 */
  @media (max-width: 768px) {
    html, body { overflow: auto; }
    .scene { grid-template-columns: 1fr; height: auto; padding-top: 56px; }
    .visual { min-height: 60vw; padding: 2rem; }
    .visual::after { background: linear-gradient(to top, var(--bg) 0%, transparent 40%); }
    .info { padding: 1.5rem 1.8rem 5rem; }
    .name-main { font-size: clamp(2.2rem, 9vw, 3.2rem); }
    .info-cards { grid-template-columns: repeat(2, 1fr); }
    footer { position: sticky; }
    .nav-links { display: none; }
    .nav-inner { padding: 0 5vw; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="circles">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
</div>

<!-- NAV -->
<nav id="nav">
  <div class="nav-inner">
    <a href="#" class="nav-logo">히루기♥</a>
    <ul class="nav-links">

<main class="scene">

  <div class="info">

    <div class="info-cards">
      <div class="info-card"><div class="info-card-label">플랫폼</div><div class="info-card-val">SOOP</div></div>
      <div class="info-card"><div class="info-card-label">데뷔</div><div class="info-card-val">26.03.11</div></div>
      <div class="info-card"><div class="info-card-label">생일</div><div class="info-card-val">8월 23일 🎂</div></div>
      <div class="info-card"><div class="info-card-label">팬 이름</div><div class="info-card-val">루냥이 🐱</div></div>

    <div class="tags">
      <span class="tag">소통</span>
      <span class="tag">게임</span>

      <span class="tag">고양이 좋아</span>
    </div>

    <nav class="links">
      <a class="btn btn-fill" href="https://www.sooplive.com/station/hiroogi0901" target="_blank">📺 방송 보러가기</a>
      <a class="btn btn-outline" href="schedule/">방송일정</a>
      <a class="btn btn-outline" href="https://www.youtube.com/@히루기" target="_blank">▶ 유튜브</a>
    </nav>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <span>© 2026 히루기♥ · 루냥이의 방</span>
    <a href="https://www.sooplive.com/station/hiroogi0901" target="_blank">SOOP →</a>
  </div>
</footer>

<script>
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', scrollY > 10);
  });
</script>
</body>
</html>
