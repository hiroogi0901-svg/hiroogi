<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방송일정 — 히루기♥</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #FFFAF7; --pink: #E8A0BC; --text: #2D1A24; --beige: #F5ECD7; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

  .page-bg {
    position: fixed; inset: 0; z-index: -1;
    background: radial-gradient(ellipse at 70% 20%, rgba(232,160,188,0.13) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(245,236,215,0.5) 0%, transparent 50%);
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    padding: 1rem 0;
    background: rgba(232,160,188,0.18);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(232,160,188,0.3);
  }
  .nav-inner {
    max-width: 860px; margin: 0 auto; padding: 0 6vw;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-logo { font-size: 1.1rem; font-weight: 700; color: var(--text); text-decoration: none; }
  .nav-back { font-size: 13px; color: rgba(45,26,36,0.6); text-decoration: none; }
  .nav-back:hover { color: var(--text); }

  /* CONTAINER */
  .container { max-width: 860px; margin: 0 auto; padding: 2.5rem 6vw 4rem; }

  /* 달력 헤더 */
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .cal-title { font-size: 1.3rem; font-weight: 700; }
  .cal-nav { display: flex; align-items: center; gap: 10px; }
  .cal-btn {
    background: rgba(232,160,188,0.15); border: 1px solid rgba(232,160,188,0.35);
    border-radius: 8px; width: 30px; height: 30px;
    font-size: 16px; color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .cal-btn:hover { background: rgba(232,160,188,0.3); }
  .cal-month-label { font-size: 14px; font-weight: 700; min-width: 76px; text-align: center; }

  /* 요일 헤더 */
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .cal-weekdays span { text-align: center; font-size: 12px; font-weight: 600; padding: 5px 0; color: rgba(45,26,36,0.55); }
  .cal-weekdays span.sun { color: #E07070; }
  .cal-weekdays span.sat { color: #7090D0; }

  /* 달력 그리드 */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; min-height: 72px;
  }
  .cal-cell.empty { background: transparent; border: none; }
  .cal-cell.normal { background: #fff; border: 1px solid rgba(45,26,36,0.07); }
  .cal-cell.has-stream { background: rgba(232,160,188,0.18); border: 1px solid rgba(232,160,188,0.4); }
  .cal-cell.has-stream:hover { background: rgba(232,160,188,0.28); }
  .cal-cell.today { border: 1.5px solid var(--pink) !important; }
  .cal-cell.today .cal-date { color: var(--pink); font-weight: 700; }
  .cal-cell.cancelled { background: rgba(45,26,36,0.03); border: 1px solid rgba(45,26,36,0.07); }
  .cal-cell.cancelled .cal-date { text-decoration: line-through; color: rgba(45,26,36,0.3); }

  .cal-date { font-size: 14px; font-weight: 500; color: rgba(45,26,36,0.78); line-height: 1; }
  .cal-cell.sun .cal-date { color: #E07070; }
  .cal-cell.sat .cal-date { color: #7090D0; }
  .cal-cell.today .cal-date { color: var(--pink) !important; font-weight: 700; }
  .cal-cell.cancelled .cal-date { text-decoration: line-through; color: rgba(45,26,36,0.28) !important; }

  .cal-time { font-size: 10px; color: rgba(45,26,36,0.6); font-weight: 500; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink); }

  /* 방송 카운트 */
  .stream-count {
    margin-top: 1rem; font-size: 13px; color: rgba(45,26,36,0.55);
    display: flex; align-items: center; gap: 7px;
  }
  .stream-count::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--pink); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* 리스트 */
  .stream-list { margin-top: 2rem; display: flex; flex-direction: column; gap: 8px; }
  .stream-item {
    display: flex; align-items: center; gap: 14px;
    background: #fff; border: 1px solid rgba(45,26,36,0.08);
    border-radius: 12px; padding: 1rem 1.25rem;
  }
  .stream-item.cancelled { opacity: 0.5; }
  .stream-date-badge {
    background: rgba(232,160,188,0.18); border: 1px solid rgba(232,160,188,0.4);
    border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 700;
    color: var(--text); white-space: nowrap; text-align: center; min-width: 52px; line-height: 1.5;
  }
  .stream-item.cancelled .stream-date-badge { background: rgba(45,26,36,0.04); border-color: rgba(45,26,36,0.1); }
  .stream-info { flex: 1; }
  .stream-title { font-size: 14px; font-weight: 500; }
  .stream-time { font-size: 12px; color: rgba(45,26,36,0.5); margin-top: 2px; }
  .stream-badge-cancel {
    font-size: 11px; color: rgba(45,26,36,0.4);
    background: rgba(45,26,36,0.06); border-radius: 20px; padding: 2px 8px;
  }

  /* FOOTER */
  footer { background: var(--beige); border-top: 1px solid rgba(45,26,36,0.08); padding: 1.5rem 0; margin-top: 2rem; }
  .footer-inner { max-width: 860px; margin: 0 auto; padding: 0 6vw; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: rgba(45,26,36,0.4); }
  footer a { color: var(--pink); text-decoration: none; }

  /* MOBILE: 7일치 리스트만 */
  @media (max-width: 640px) {
    .cal-grid-wrap { display: none; }
    .cal-weekdays { display: none; }
    .mobile-week { display: flex; flex-direction: column; gap: 8px; }
    .container { padding: 1.5rem 5vw 3rem; }
    .nav-inner { padding: 0 5vw; }
    .footer-inner { padding: 0 5vw; }
  }
  @media (min-width: 641px) {
    .mobile-week { display: none; }
  }
</style>
</head>
<body>

<div class="page-bg"></div>

<nav>
  <div class="nav-inner">
    <a href="../" class="nav-back">← 돌아가기</a>
    <a href="../" class="nav-logo">히루기♥</a>
    <span style="width:72px;"></span>
  </div>
</nav>

<div class="container">
  <div class="cal-header">
    <h1 class="cal-title">방송 일정</h1>
    <div class="cal-nav">
      <button class="cal-btn" id="cal-prev">‹</button>
      <span class="cal-month-label" id="cal-month"></span>
      <button class="cal-btn" id="cal-next">›</button>
    </div>
  </div>

  <!-- 데스크탑: 달력 -->
  <div class="cal-weekdays">
    <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
  </div>
  <div class="cal-grid-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <p class="stream-count" id="stream-count"></p>
  <div class="stream-list" id="stream-list"></div>

  <!-- 모바일: 7일치 리스트 -->
  <div class="mobile-week" id="mobile-week"></div>
</div>

<footer>
  <div class="footer-inner">
    <span>© 2026 히루기♥ · 루냥이의 방</span>
    <a href="https://www.sooplive.com/station/hiroogi0901" target="_blank">SOOP 바로가기 →</a>
  </div>
</footer>

<script>
  const SUPABASE_URL  = 'https://xjgzdngivwjemcuzwsiw.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqZ3pkbmdpdndqZW1jdXp3c2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNzI2NDcsImV4cCI6MjA5NDc0ODY0N30.dm1CYfoh_kVm-XDzbclOzt7qQezrk7ocSbNBMYF_v3M';
  const DAY_KR = ['일','월','화','수','목','금','토'];

  const now = new Date();
  let calYear = now.getFullYear(), calMonth = now.getMonth();
  let scheduleMap = {}, scheduleList = [];

  async function fetchSchedule(year, month) {
    const from = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const to   = `${year}-${String(month+1).padStart(2,'0')}-${new Date(year, month+1, 0).getDate()}`;
    const res  = await fetch(
      `${SUPABASE_URL}/rest/v1/stream_schedule?select=*&scheduled_date=gte.${from}&scheduled_date=lte.${to}&order=scheduled_date`,
      { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
    );
    const data = await res.json();
    scheduleMap = {};
    scheduleList = data;
    data.forEach(row => { scheduleMap[row.scheduled_date] = row; });
  }

  function renderCalendar() {
    const grid     = document.getElementById('cal-grid');
    const label    = document.getElementById('cal-month');
    const count    = document.getElementById('stream-count');
    const list     = document.getElementById('stream-list');
    const todayStr = now.toISOString().slice(0, 10);

    label.textContent = `${calYear}년 ${calMonth + 1}월`;

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const lastDate = new Date(calYear, calMonth + 1, 0).getDate();

    // 달력
    let html = '';
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= lastDate; d++) {
      const ds      = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const row     = scheduleMap[ds];
      const isToday = ds === todayStr;
      const dow     = new Date(ds).getDay(); // 0=일, 6=토
      const dowCls  = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';

      if (row) {
        const time = row.start_time ? row.start_time.slice(0,5) : '';
        const cls  = row.is_active ? 'has-stream' : 'cancelled';
        html += `<div class="cal-cell ${cls} ${isToday?'today':''} ${dowCls}">
          <span class="cal-date">${d}</span>
          ${row.is_active
            ? `<span class="cal-dot"></span><span class="cal-time">${time}</span>`
            : `<span class="cal-time" style="font-size:9px;">휴방</span>`}
        </div>`;
      } else {
        html += `<div class="cal-cell normal ${isToday?'today':''} ${dowCls}"><span class="cal-date">${d}</span></div>`;
      }
    }
    grid.innerHTML = html;

    // 카운트
    const cnt = scheduleList.filter(r => r.is_active).length;
    count.textContent = cnt > 0 ? `이번 달 방송 ${cnt}회 예정` : '';

    // 리스트
    list.innerHTML = scheduleList.length === 0 ? '' : scheduleList.map(row => {
      const d   = new Date(row.scheduled_date);
      const day = DAY_KR[d.getDay()];
      const time = row.start_time ? row.start_time.slice(0,5) : '';
      const mm  = String(d.getMonth()+1).padStart(2,'0');
      const dd  = String(d.getDate()).padStart(2,'0');
      return `<div class="stream-item ${row.is_active?'':'cancelled'}">
        <div class="stream-date-badge">${mm}/${dd}<br><span style="font-weight:400;font-size:11px;">${day}</span></div>
        <div class="stream-info">
          <div class="stream-title">${row.title || '방송'}</div>
          <div class="stream-time">${time}${row.note ? ` · ${row.note}` : ''}</div>
        </div>
        ${!row.is_active ? '<span class="stream-badge-cancel">휴방</span>' : ''}
      </div>`;
    }).join('');
  }

  function renderMobileWeek() {
    // 오늘부터 7일치
    const wrap = document.getElementById('mobile-week');
    const items = [];
    for (let i = 0; i < 7; i++) {
      const d   = new Date(now); d.setDate(now.getDate() + i);
      const ds  = d.toISOString().slice(0,10);
      const row = scheduleMap[ds];
      const dow = d.getDay();
      const dowLabel = DAY_KR[dow];
      const isToday  = i === 0;
      const mm = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const dowColor = dow===0 ? 'color:#E07070;' : dow===6 ? 'color:#7090D0;' : '';

      if (row) {
        const time = row.start_time ? row.start_time.slice(0,5) : '';
        items.push(`<div class="stream-item ${row.is_active?'':'cancelled'}">
          <div class="stream-date-badge" style="${isToday?'border-color:var(--pink);':''}">${mm}/${dd}<br><span style="font-weight:400;font-size:11px;${dowColor}">${dowLabel}</span></div>
          <div class="stream-info">
            <div class="stream-title">${row.title || '방송'}</div>
            <div class="stream-time">${time}${row.note ? ` · ${row.note}` : ''}</div>
          </div>
          ${!row.is_active ? '<span class="stream-badge-cancel">휴방</span>' : ''}
        </div>`);
      } else {
        items.push(`<div class="stream-item" style="opacity:0.4;">
          <div class="stream-date-badge">${mm}/${dd}<br><span style="font-weight:400;font-size:11px;${dowColor}">${dowLabel}</span></div>
          <div class="stream-info"><div class="stream-title" style="color:rgba(45,26,36,0.4);">방송 없음</div></div>
        </div>`);
      }
    }
    wrap.innerHTML = items.join('');
  }

  async function loadMonth() {
    await fetchSchedule(calYear, calMonth);
    renderCalendar();

    // 모바일: 이번달 + 필요시 다음달도 fetch
    const todayMonth = now.getMonth();
    if (calYear === now.getFullYear() && calMonth === todayMonth) {
      // 7일치 중 다음달 포함 가능 → 다음달도 fetch
      const nextM = todayMonth === 11 ? 0 : todayMonth + 1;
      const nextY = todayMonth === 11 ? now.getFullYear()+1 : now.getFullYear();
      await fetchScheduleExtra(nextY, nextM);
    }
    renderMobileWeek();
  }

  async function fetchScheduleExtra(year, month) {
    const from = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const to   = `${year}-${String(month+1).padStart(2,'0')}-${new Date(year, month+1, 0).getDate()}`;
    const res  = await fetch(
      `${SUPABASE_URL}/rest/v1/stream_schedule?select=*&scheduled_date=gte.${from}&scheduled_date=lte.${to}`,
      { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
    );
    const data = await res.json();
    data.forEach(row => { scheduleMap[row.scheduled_date] = row; });
  }

  document.getElementById('cal-prev').onclick = () => { if(--calMonth < 0){calMonth=11;calYear--;} loadMonth(); };
  document.getElementById('cal-next').onclick = () => { if(++calMonth > 11){calMonth=0;calYear++;} loadMonth(); };

  loadMonth();
</script>
</body>
</html>
