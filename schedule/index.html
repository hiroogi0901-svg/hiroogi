<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방송일정 — 히루기♥</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #FFFAF7; --pink: #E8A0BC; --text: #2D1A24; --beige: #F5ECD7; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }
  .page-bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 70% 60% at 30% 50%, rgba(245,230,215,0.45) 0%, transparent 65%),
      radial-gradient(ellipse 50% 70% at 80% 30%, rgba(232,160,188,0.13) 0%, transparent 60%),
      var(--bg);
  }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; padding: 0.75rem 0; background: rgba(232,160,188,0.15); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(232,160,188,0.25); }
  .nav-inner { max-width: 860px; margin: 0 auto; padding: 0 5vw; display: flex; justify-content: space-between; align-items: center; }
  .nav-logo { font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); text-decoration: none; }
  .nav-back { font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; transition: color 0.2s; }
  .nav-back:hover { color: var(--text); }

  .container { max-width: 860px; margin: 0 auto; padding: 2.5rem 6vw 4rem; }

  /* 헤더 */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .cal-title { font-size: 1.3rem; font-weight: 700; }
  .cal-nav { display: flex; align-items: center; gap: 10px; }
  .cal-btn { background: rgba(232,160,188,0.15); border: 1px solid rgba(232,160,188,0.35); border-radius: 8px; width: 30px; height: 30px; font-size: 16px; color: var(--text); cursor: pointer; transition: background 0.15s; }
  .cal-btn:hover { background: rgba(232,160,188,0.3); }
  .cal-month-label { font-size: 14px; font-weight: 700; min-width: 76px; text-align: center; }

  /* 타입 범례 */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(45,26,36,0.6); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* 달력 */
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .cal-weekdays span { text-align: center; font-size: 12px; font-weight: 600; padding: 5px 0; color: rgba(45,26,36,0.55); }
  .cal-weekdays span.sun { color: #E07070; }
  .cal-weekdays span.sat { color: #7090D0; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-cell {
    border-radius: 10px; min-height: 80px;
    display: flex; flex-direction: column;
    align-items: flex-start; padding: 7px 6px; gap: 3px;
    background: #fff; border: 1px solid rgba(45,26,36,0.07);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .cal-cell.empty { background: transparent; border: none; pointer-events: none; }
  .cal-cell.today { border: 1.5px solid var(--pink) !important; }
  .cal-cell.past { opacity: 0.45; }
  .cal-date { font-size: 12px; font-weight: 600; color: rgba(45,26,36,0.7); line-height: 1; margin-bottom: 2px; }
  .cal-cell.sun .cal-date { color: #E07070; }
  .cal-cell.sat .cal-date { color: #7090D0; }
  .cal-cell.today .cal-date { color: var(--pink) !important; font-weight: 700; }

  /* 달력 이벤트 태그 — 판다율 스타일 */
  .cal-event {
    width: 100%; font-size: 10px; padding: 2px 5px; border-radius: 5px;
    color: #fff; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; transition: opacity 0.2s;
    line-height: 1.5;
  }
  .cal-event:hover { opacity: 0.82; }
  .cal-event.cancelled { opacity: 0.5; text-decoration: line-through; }

  /* 모달 */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(45,26,36,0.3); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 2rem; width: 360px; max-width: 90vw; position: relative; }
  .modal-top { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .modal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .modal-type { font-size: 11px; color: rgba(45,26,36,0.5); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
  .modal-date { font-size: 13px; color: rgba(45,26,36,0.55); margin-bottom: 0.3rem; }
  .modal-time { font-size: 13px; color: rgba(45,26,36,0.55); margin-bottom: 0.8rem; }
  .modal-desc { font-size: 13px; color: rgba(45,26,36,0.7); line-height: 1.7; border-top: 1px solid rgba(45,26,36,0.08); padding-top: 0.8rem; }
  .modal-close { position: absolute; top: 1rem; right: 1.2rem; background: none; border: none; font-size: 18px; cursor: pointer; color: rgba(45,26,36,0.4); }
  .modal-close:hover { color: var(--text); }

  /* 모바일 주간 탭 */
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .week-nav-btn { background: rgba(232,160,188,0.15); border: 1px solid rgba(232,160,188,0.35); border-radius: 8px; width: 32px; height: 32px; font-size: 16px; color: var(--text); cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
  .week-nav-btn:hover { background: rgba(232,160,188,0.3); }
  .week-nav-label { font-size: 13px; font-weight: 700; color: var(--text); }

  /* 모바일 리스트 */
  .mobile-list { display: flex; flex-direction: column; gap: 8px; }
  .stream-item {
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    background: #fff; border: 1px solid rgba(45,26,36,0.08);
    border-radius: 12px; padding: 0.9rem 1.1rem;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stream-item:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(232,160,188,0.18); }
  .stream-item.no-stream { opacity: 0.35; pointer-events: none; }
  .stream-date-badge { flex-shrink: 0; min-width: 48px; text-align: center; border-radius: 10px; padding: 5px 8px; line-height: 1.4; font-size: 13px; font-weight: 700; border: 1px solid rgba(232,160,188,0.35); background: rgba(232,160,188,0.1); }
  .stream-date-badge .dow { font-size: 11px; font-weight: 400; display: block; }
  .stream-date-badge.today-badge { border-color: var(--pink); }
  .stream-type-bar { width: 3px; height: 34px; border-radius: 4px; flex-shrink: 0; }
  .stream-info { flex: 1; }
  .stream-title { font-size: 14px; font-weight: 600; }
  .stream-sub { font-size: 12px; color: rgba(45,26,36,0.5); margin-top: 2px; }
  .stream-type-badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; color: #fff; font-weight: 600; flex-shrink: 0; }

  /* FOOTER */
  footer { background: rgba(245,236,215,0.88); backdrop-filter: blur(12px); border-top: 1px solid rgba(45,26,36,0.07); padding: 1.1rem 0; margin-top: 2rem; }
  .footer-inner { max-width: 860px; margin: 0 auto; padding: 0 5vw; font-family: 'Noto Sans KR', sans-serif; font-size: 10px; color: rgba(45,26,36,0.38); }
  footer a { color: var(--pink); text-decoration: none; }

  /* 반응형 */
  @media (max-width: 640px) {
    .cal-grid-wrap, .cal-weekdays, .legend, .desktop-only { display: none; }
    .mobile-section { display: block; }
    .container { padding: 1.5rem 5vw 3rem; }
    .nav-inner, .footer-inner { padding: 0 5vw; }
  }
  @media (min-width: 641px) {
    .mobile-section { display: none; }
    .cal-grid-wrap { display: block; }
  }
</style>
</head>
<body>
<div class="page-bg"></div>

<nav>
  <div class="nav-inner">
    <a href="../" class="nav-back">← 돌아가기</a>
    <a href="../" class="nav-logo">히루기♥</a>
    <span style="width:72px;"></span>
  </div>
</nav>

<div class="container">
  <div class="cal-header">
    <h1 class="cal-title">방송 일정</h1>
    <div class="cal-nav">
      <button class="cal-btn" id="cal-prev">‹</button>
      <span class="cal-month-label" id="cal-month"></span>
      <button class="cal-btn" id="cal-next">›</button>
    </div>
  </div>

  <!-- 데스크탑 범례 -->
  <div class="legend" id="legend"></div>

  <!-- 데스크탑 달력 -->
  <div class="cal-weekdays">
    <span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span>
  </div>
  <div class="cal-grid-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- 모바일 주간 탭 + 리스트 -->
  <div class="mobile-section">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="shiftWeek(-1)">‹</button>
      <span class="week-nav-label" id="week-label"></span>
      <button class="week-nav-btn" onclick="shiftWeek(1)">›</button>
    </div>
    <div class="mobile-list" id="mobile-list"></div>
  </div>
</div>

<!-- 팝업 모달 -->
<div class="modal-bg" id="event-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-top">
      <span class="modal-dot" id="modal-dot"></span>
      <span class="modal-type" id="modal-type"></span>
    </div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-time" id="modal-time"></div>
    <div class="modal-desc" id="modal-desc" style="display:none;"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <span>© 2026 히루기♥ · 루냥이의 방</span>
  </div>
</footer>

<script>
  const SUPABASE_URL  = 'https://xjgzdngivwjemcuzwsiw.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqZ3pkbmdpdndqZW1jdXp3c2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNzI2NDcsImV4cCI6MjA5NDc0ODY0N30.dm1CYfoh_kVm-XDzbclOzt7qQezrk7ocSbNBMYF_v3M';

  const TYPE_COLORS = { broadcast:'#E8A0BC', game:'#93C5FD', song:'#6EBF9E', collab:'#FCA5A5', event:'#FCD34D', rest:'#C0B6D6', other:'#D1D5DB' };
  const TYPE_LABELS = { broadcast:'방송', game:'게임', song:'노래', collab:'합방', event:'이벤트', rest:'휴방', other:'기타' };
  const DAY_KR = ['일','월','화','수','목','금','토'];

  const now = new Date();
  let calYear = now.getFullYear(), calMonth = now.getMonth();
  let scheduleMap = {}, allSchedules = [];
  let weekOffset = 0;

  function getColor(row) { return !row.is_active ? TYPE_COLORS.rest : (row.color || TYPE_COLORS[row.content_type] || TYPE_COLORS.broadcast); }
  function getLabel(row) { return !row.is_active ? TYPE_LABELS.rest : (TYPE_LABELS[row.content_type] || TYPE_LABELS.broadcast); }

  // 범례
  function renderLegend() {
    document.getElementById('legend').innerHTML = Object.entries(TYPE_LABELS).map(([k,v]) =>
      `<div class="legend-item"><div class="legend-dot" style="background:${TYPE_COLORS[k]}"></div>${v}</div>`
    ).join('');
  }

  async function fetchSchedule(year, month) {
    const from = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const to   = `${year}-${String(month+1).padStart(2,'0')}-${new Date(year, month+1, 0).getDate()}`;
    const res  = await fetch(
      `${SUPABASE_URL}/rest/v1/stream_schedule?select=*&scheduled_date=gte.${from}&scheduled_date=lte.${to}&order=scheduled_date`,
      { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
    );
    const data = await res.json();
    data.forEach(row => { scheduleMap[row.scheduled_date] = row; });
    allSchedules = [...allSchedules.filter(r => !data.find(d => d.id === r.id)), ...data];
  }

  // 달력 렌더 — 판다율 스타일 이벤트 태그
  function renderCalendar() {
    const grid     = document.getElementById('cal-grid');
    const label    = document.getElementById('cal-month');
    const todayStr = now.toISOString().slice(0, 10);
    label.textContent = `${calYear}년 ${calMonth + 1}월`;

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const lastDate = new Date(calYear, calMonth + 1, 0).getDate();

    let html = '';
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell empty"></div>`;

    for (let d = 1; d <= lastDate; d++) {
      const ds      = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const row     = scheduleMap[ds];
      const isToday = ds === todayStr;
      const isPast  = ds < todayStr && !isToday;
      const dow     = new Date(ds).getDay();
      const dowCls  = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
      const pastCls = isPast ? 'past' : '';

      let eventHtml = '';
      if (row) {
        const c    = getColor(row);
        const time = row.start_time ? row.start_time.slice(0,2).replace(/^0/,'')+'시 ' : '';
        const ttl  = row.title || '방송';
        const canCls = !row.is_active ? 'cancelled' : '';
        eventHtml = `<div class="cal-event ${canCls}" style="background:${c}" onclick="showModal('${row.id}')">${time}${ttl}</div>`;
      }

      html += `<div class="cal-cell ${isToday?'today':''} ${dowCls} ${pastCls}">
        <div class="cal-date">${d}</div>
        ${eventHtml}
      </div>`;
    }
    grid.innerHTML = html;
  }


  function shiftWeek(dir) {
    weekOffset += dir;
    renderMobileWeek();
  }

  function renderMobileWeek() {
    const list = document.getElementById('mobile-list');
    const label = document.getElementById('week-label');

    // 이번주 일요일 기준
    const todayDow  = now.getDay();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - todayDow + (weekOffset * 7));
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);

    const fmtMD = d => `${d.getMonth()+1}/${d.getDate()}`;
    if (weekOffset === 0) label.textContent = '이번 주';
    else if (weekOffset === 1) label.textContent = '다음 주';
    else if (weekOffset === -1) label.textContent = '저번 주';
    else label.textContent = `${fmtMD(weekStart)} — ${fmtMD(weekEnd)}`;

    const items = [];
    for (let i = 0; i < 7; i++) {
      const d   = new Date(weekStart); d.setDate(weekStart.getDate() + i);
      const ds  = d.toISOString().slice(0,10);
      const row = scheduleMap[ds];
      const dow = d.getDay();
      const isToday = ds === now.toISOString().slice(0,10);
      const mm  = String(d.getMonth()+1).padStart(2,'0');
      const dd  = String(d.getDate()).padStart(2,'0');
      const dowColor = dow===0?'color:#E07070':dow===6?'color:#7090D0':'';

      if (row) {
        const c   = getColor(row);
        const lbl = getLabel(row);
        const time = row.start_time ? row.start_time.slice(0,5) : '';
        items.push(`<div class="stream-item" onclick="showModal('${row.id}')">
          <div class="stream-date-badge ${isToday?'today-badge':''}">${mm}/${dd}<span class="dow" style="${dowColor}">${DAY_KR[dow]}</span></div>
          <div class="stream-type-bar" style="background:${c}"></div>
          <div class="stream-info">
            <div class="stream-title">${row.title || '방송'}</div>
            <div class="stream-sub">${time}${row.description?' · '+row.description.slice(0,20):''}</div>
          </div>
          <span class="stream-type-badge" style="background:${c}">${lbl}</span>
        </div>`);
      } else {
        items.push(`<div class="stream-item no-stream">
          <div class="stream-date-badge">${mm}/${dd}<span class="dow" style="${dowColor}">${DAY_KR[dow]}</span></div>
          <div class="stream-type-bar" style="background:rgba(45,26,36,0.1)"></div>
          <div class="stream-info"><div class="stream-title" style="color:rgba(45,26,36,0.3);">방송 없음</div></div>
        </div>`);
      }
    }
    list.innerHTML = items.join('');
  }

  function showModal(id) {
    const row = allSchedules.find(r => String(r.id) === String(id));
    if (!row) return;
    const c    = getColor(row);
    const lbl  = getLabel(row);
    const d    = new Date(row.scheduled_date);
    const time = row.start_time ? row.start_time.slice(0,5) : '';
    document.getElementById('modal-dot').style.background = c;
    document.getElementById('modal-type').textContent     = lbl;
    document.getElementById('modal-title').textContent    = row.title || '방송';
    document.getElementById('modal-date').textContent     = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_KR[d.getDay()]})`;
    document.getElementById('modal-time').textContent     = time ? `${time} 방송 시작` : '';
    const desc = document.getElementById('modal-desc');
    if (row.description) { desc.textContent = row.description; desc.style.display = 'block'; }
    else { desc.style.display = 'none'; }
    document.getElementById('event-modal').classList.add('open');
  }
  function closeModal() { document.getElementById('event-modal').classList.remove('open'); }
  document.getElementById('event-modal').addEventListener('click', e => { if(e.target===document.getElementById('event-modal')) closeModal(); });

  async function loadMonth() {
    scheduleMap = {}; allSchedules = [];
    await fetchSchedule(calYear, calMonth);
    // 다음주가 다음달 걸칠 수 있으니 다음달도 fetch
    const nm = calMonth === 11 ? 0 : calMonth + 1;
    const ny = calMonth === 11 ? calYear + 1 : calYear;
    await fetchSchedule(ny, nm);
    renderCalendar();
    renderMobileWeek();
  }

  document.getElementById('cal-prev').onclick = () => { if(--calMonth < 0){calMonth=11;calYear--;} loadMonth(); };
  document.getElementById('cal-next').onclick = () => { if(++calMonth > 11){calMonth=0;calYear++;} loadMonth(); };

  renderLegend();
  loadMonth();
</script>
</body>
</html>
